<svg xmlns="http://www.w3.org/2000/svg" viewBox="52 52 408 388" width="408" height="388">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ECC71;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Square background with rounded corners -->
  <rect x="52" y="52" width="408" height="388" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Clock and indicators: scaled to fill the card (center 256,246) -->
  <g transform="translate(256,246) scale(1.28) translate(-256,-240)">
    <!-- Clock face outer ring -->
    <circle cx="256" cy="240" r="136" fill="none" stroke="url(#ringGrad)" stroke-width="16" filter="url(#shadow)"/>

    <!-- Clock face inner area -->
    <circle cx="256" cy="240" r="124" fill="#1E2A38" stroke="#2C3E50" stroke-width="2"/>

    <!-- Allowed segment wedge: 22:00 to 2:00, sweeping clockwise -->
    <path d="M256,240 
           L161.7,177.6 
           A114,124 0 0,1 346.3,177.6 
           Z"
          fill="#2ECC71" opacity="0.3"/>

    <!-- Outer arc border for allowed segment -->
    <path d="M161.7,177.6 A114,124 0 0,1 346.3,177.6"
          fill="none" stroke="#2ECC71" stroke-width="5" stroke-linecap="round" opacity="0.8" filter="url(#shadow)"/>

    <!-- Clock tick marks (r=136 outer edge, 20px inward, stroke-width 4) -->
    <!-- 12 -->
    <line x1="256.0" y1="104.0" x2="256.0" y2="124.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 1 -->
    <line x1="324.0" y1="122.2" x2="314.0" y2="139.5" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 2 -->
    <line x1="373.8" y1="172.0" x2="356.5" y2="182.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 3 -->
    <line x1="392.0" y1="240.0" x2="372.0" y2="240.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 4 -->
    <line x1="373.8" y1="308.0" x2="356.5" y2="298.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 5 -->
    <line x1="324.0" y1="357.8" x2="314.0" y2="340.5" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 6 -->
    <line x1="256.0" y1="376.0" x2="256.0" y2="356.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 7 -->
    <line x1="188.0" y1="357.8" x2="198.0" y2="340.5" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 8 -->
    <line x1="138.2" y1="308.0" x2="155.5" y2="298.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 9 -->
    <line x1="120.0" y1="240.0" x2="140.0" y2="240.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 10 -->
    <line x1="138.2" y1="172.0" x2="155.5" y2="182.0" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>
    <!-- 11 -->
    <line x1="188.0" y1="122.2" x2="198.0" y2="139.5" stroke="#ECF0F1" stroke-width="4" stroke-linecap="round"/>

    <!-- Hour hand -->
    <line x1="256" y1="240" x2="196" y2="165" stroke="#3498DB" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>

    <!-- Minute hand -->
    <line x1="256" y1="240" x2="320" y2="175" stroke="#2ECC71" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>

    <!-- Center dot -->
    <circle cx="256" cy="240" r="10" fill="#2ECC71"/>
    <circle cx="256" cy="240" r="5" fill="#1E2A38"/>

    <!-- Lock icon (restricted hours indicator) -->
    <g transform="translate(222, 260) scale(2,2)">
      <rect x="0" y="18" width="34" height="26" rx="5" ry="5" fill="#E74C3C" filter="url(#shadow)"/>
      <path d="M10,18 L10,10 C10,0 24,0 24,10 L24,18" fill="none" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>
      <rect x="11" y="27" width="12" height="9" rx="2" ry="2" fill="#1E2A38"/>
    </g>

    <!-- Checkmark in allowed area -->
    <g transform="translate(238, 158) scale(2,2)">
      <polyline points="0,10 8,18 24,0" fill="none" stroke="#2ECC71" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    </g>
  </g>

  <!-- Title : OFF
  <text x="256" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#ECF0F1" text-anchor="middle" filter="url(#shadow)">LOGIN HOURS</text>
  OFF -->

  <!-- Subtitle : OFF
  <text x="256" y="454" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#7F8C8D" text-anchor="middle" letter-spacing="4">CONTROL</text>
  OFF -->
</svg>
